name: Docker Build

on:
  push:
    branches: [ main, test, 'claude/**' ]
  pull_request:
    branches: [ main, test ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: Kali-AI:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Validate docker-compose.yml
      run: |
        which docker-compose >/dev/null 2>&1 && docker-compose config > /dev/null 2>&1 || docker compose config > /dev/null 2>&1 || (echo "❌ Invalid docker-compose.yml" && exit 1)
        echo "✓ docker-compose.yml is valid"
