name: Lint & Format

on:
  push:
    branches: [ main, test, 'claude/**' ]
  pull_request:
    branches: [ main, test ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint:check
      continue-on-error: true

    - name: Check Prettier formatting
      run: npm run format:check
      continue-on-error: true

    - name: Report violations
      if: failure()
      run: |
        echo "❌ Linting or formatting violations found"
        echo "Run 'npm run lint' to auto-fix ESLint issues"
        echo "Run 'npm run format' to auto-fix formatting"
        exit 1
