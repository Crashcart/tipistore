name: Auto-merge test→main on approval

on:
  pull_request:
    branches: [ main ]
    types: [ opened, reopened, synchronize, review_requested ]

jobs:
  check-approval:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
    - name: Check if PR is from test branch
      run: |
        if [ "${{ github.head_ref }}" != "test" ]; then
          echo "⚠️  This workflow only applies to PRs from test→main"
          exit 0
        fi
        echo "✓ PR is from test branch"

    - name: Check PR approval status
      uses: actions/github-script@v6
      id: check-approval
      with:
        script: |
          const pr = context.payload.pull_request;
          const reviews = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
          });

          const approvals = reviews.data.filter(r => r.state === 'APPROVED');
          const changesRequested = reviews.data.filter(r => r.state === 'CHANGES_REQUESTED');

          console.log(`✓ Approvals: ${approvals.length}`);
          console.log(`⚠️  Changes requested: ${changesRequested.length}`);

          return {
            approved: approvals.length > 0,
            changesRequested: changesRequested.length > 0
          };

  auto-merge:
    runs-on: ubuntu-latest
    needs: check-approval
    if: |
      github.head_ref == 'test' &&
      github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Check if all required checks passed
      uses: actions/github-script@v6
      with:
        script: |
          const pr = context.payload.pull_request;
          const checkSuites = await github.rest.checks.listSuitesForRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: pr.head.sha,
          });

          const requiredChecks = ['Tests', 'Lint & Format', 'Docker Build'];
          let allPassed = true;

          checkSuites.data.check_suites.forEach(suite => {
            if (requiredChecks.includes(suite.app.name)) {
              const passed = suite.conclusion === 'success';
              console.log(`${passed ? '✓' : '✗'} ${suite.app.name}: ${suite.conclusion}`);
              if (!passed) allPassed = false;
            }
          });

          if (!allPassed) {
            core.setFailed('Not all required checks have passed');
          }

    - name: Verify approval
      uses: actions/github-script@v6
      with:
        script: |
          const pr = context.payload.pull_request;
          const reviews = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number,
          });

          const hasApproval = reviews.data.some(r => r.state === 'APPROVED');
          const hasChangesRequested = reviews.data.some(r => r.state === 'CHANGES_REQUESTED');

          if (!hasApproval) {
            core.setFailed('PR must be approved by at least one reviewer');
          }

          if (hasChangesRequested) {
            core.setFailed('PR has changes requested - resolve them before merging');
          }

    - name: Enable auto-merge (squash)
      uses: actions/github-script@v6
      if: success()
      with:
        script: |
          const pr = context.payload.pull_request;
          try {
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash',
              commit_title: `Release: ${new Date().toISOString().split('T')[0]}`,
              commit_message: 'Automated merge from test branch\n\nAll checks passed and PR approved.',
            });
            console.log('✓ PR merged successfully');
          } catch (error) {
            console.log('Auto-merge not available, manual merge required');
          }

    - name: Create GitHub Release
      uses: actions/github-script@v6
      if: success()
      with:
        script: |
          const today = new Date().toISOString().split('T')[0];
          const version = `v${today.replace(/-/g, '.')}`;

          try {
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Release ${version}`,
              body: '## Changes\n\n- Report Generation\n- Database Persistence\n- Reverse Shell Handler\n- Proxy Configuration Support\n\nAll tests passing. Production ready.',
              draft: false,
              prerelease: false,
            });
            console.log(`✓ Release ${version} created`);
          } catch (error) {
            console.log('Release creation skipped or failed');
          }

    - name: Post success comment
      uses: actions/github-script@v6
      if: success()
      with:
        script: |
          const pr = context.payload.pull_request;
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: pr.number,
            body: '✅ **Auto-merge complete!**\n\n- All checks passed ✓\n- PR approved ✓\n- Merged to main ✓\n- Release created ✓\n\nProduction deployment ready.',
          });
