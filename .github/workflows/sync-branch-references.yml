name: Sync Branch References

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'install.sh'
      - 'uninstall.sh'

jobs:
  sync-refs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Update test→main references
        run: |
          echo "Updating branch references from test to main..."
          sed -i 's|/test/|/main/|g' README.md install.sh uninstall.sh
          echo "Done"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected - will commit"
            git diff
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md install.sh uninstall.sh
          git commit -m "chore: update branch references from test to main"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
