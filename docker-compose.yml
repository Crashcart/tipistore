version: '3.8'

services:
  app:
    build: .
    container_name: Kali-AI-app
    ports:
      - "0.0.0.0:31337:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BIND_HOST=0.0.0.0
      - OLLAMA_URL=http://host.docker.internal:11434
      - KALI_CONTAINER=Kali-AI-linux
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      - kali
    networks:
      - Kali-AI-net
    restart: unless-stopped

  kali:
    image: kalilinux/kali-rolling:latest
    container_name: Kali-AI-linux
    stdin_open: true
    tty: true
    networks:
      - Kali-AI-net
    command: /bin/bash
    restart: unless-stopped

networks:
  Kali-AI-net:
    driver: bridge
