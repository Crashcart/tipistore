version: '3.8'

services:
  app:
    build: .
    container_name: kali-hacker-bot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - OLLAMA_URL=http://ollama:11434
      - KALI_CONTAINER=kali-linux
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    depends_on:
      - kali
      - ollama
    networks:
      - pentest-net
    restart: unless-stopped

  kali:
    image: kalilinux/kali-rolling:latest
    container_name: kali-linux
    stdin_open: true
    tty: true
    networks:
      - pentest-net
    command: /bin/bash
    restart: unless-stopped
    # Kali will be controlled via Docker API, not directly

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - pentest-net
    restart: unless-stopped

volumes:
  ollama-data:

networks:
  pentest-net:
    driver: bridge
